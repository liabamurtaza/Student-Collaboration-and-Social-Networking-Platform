services:
  # MongoDB Database Service
  mongodb:
    image: mongo:latest
    container_name: social_network_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - social_network_net

  # Node.js Backend Service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: social_network_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/social_network
      - JWT_SECRET=your_super_secret_jwt_key
    depends_on:
      - mongodb
    networks:
      - social_network_net
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules

networks:
  social_network_net:
    driver: bridge

volumes:
  mongodb_data:
